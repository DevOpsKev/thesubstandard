<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Substandard — All the news that's fit to mangle</title>
<meta name="description" content="Real news. Fake words. The Substandard takes today's headlines and puts them through the mangler.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f8f7f2;
    --paper-alt: #f0efe8;
    --faded: #888;
    --light: #ccc;
    --rule: #999;
    --red: #c00;
    --highlight: rgba(255,200,0,0.35);
    --green: #5a5;
    --serif: 'Playfair Display', Georgia, serif;
    --body: 'Source Serif 4', Georgia, serif;
    --mono: 'Courier Prime', monospace;
    --col-gap: 28px;
    --rule-width: 1px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--paper);
    font-family: var(--body);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px 48px; }

  /* ── Masthead ── */
  .masthead { text-align: center; padding: 20px 0 16px; border-top: 4px solid var(--ink); border-bottom: 2px solid var(--ink); margin-bottom: 0; position: relative; }
  .masthead::after { content: ''; display: block; position: absolute; bottom: -5px; left: 0; right: 0; border-bottom: 1px solid var(--ink); }
  .masthead-tagline { font: 400 10px/1 var(--mono); letter-spacing: 8px; text-transform: uppercase; color: var(--faded); margin-bottom: 6px; }
  .masthead h1 { font: 900 clamp(40px,8vw,80px)/0.95 var(--serif); letter-spacing: -2px; color: var(--ink); margin: 0; }
  .masthead-meta { display: flex; justify-content: space-between; align-items: center; font: 400 11px/1 var(--mono); color: var(--faded); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--light); }
  .masthead-meta .sep { color: var(--light); }
  @media (max-width: 500px) { .masthead-meta { justify-content: center; flex-wrap: wrap; gap: 8px; } }

  /* ── Edition bar ── */
  .edition-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid var(--light);
    font: 700 10px/1 var(--mono); letter-spacing: 2px; text-transform: uppercase; color: var(--faded);
    margin-bottom: 0;
  }
  .edition-bar .feed-label { color: var(--red); }

  /* ── Navigation ── */
  .main-nav { display: flex; justify-content: center; border-bottom: 1px solid var(--ink); border-top: 1px solid var(--light); margin-bottom: 0; margin-top: 4px; }
  .main-nav button {
    padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent;
    font: 400 11px/1 var(--mono); letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; color: var(--faded); margin-bottom: -1px; transition: all 0.15s;
  }
  .main-nav button.active { color: var(--ink); font-weight: 700; border-bottom-color: var(--red); }
  .main-nav button:hover { color: var(--ink); }

  .feed-nav { display: flex; justify-content: center; gap: 0; border-bottom: 1px solid var(--light); margin-bottom: 0; padding: 0; }
  .feed-nav button {
    padding: 8px 18px; background: none; border: none; border-bottom: 2px solid transparent;
    font: 400 13px/1 var(--mono); letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; color: var(--faded); margin-bottom: -1px; transition: all 0.15s;
  }
  .feed-nav button.active { color: var(--ink); font-weight: 700; border-bottom-color: var(--red); }
  .feed-nav button:hover { color: var(--ink); }
  .feed-nav .dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); margin-left: 5px; vertical-align: middle; opacity: 0.7;
  }

  /* ── Controls ── */
  .controls { display: flex; justify-content: center; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
  .btn {
    padding: 8px 20px; border: none; font: 700 12px/1 var(--mono); letter-spacing: 1px;
    cursor: pointer; transition: opacity 0.15s; text-transform: uppercase;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:disabled { opacity: 0.6; cursor: wait; }
  .btn-toggle { background: #fff; color: var(--ink); border: 1.5px solid var(--ink); }
  .btn-toggle.on { background: var(--red); color: #fff; border-color: var(--red); }

  /* ── Section header ── */
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0 16px; font: 900 12px/1 var(--mono); letter-spacing: 3px; text-transform: uppercase; color: var(--red);
  }
  .section-header::before, .section-header::after { content: ''; flex: 1; height: 1px; background: var(--ink); }

  /* ── Newspaper grid ── */
  .articles { margin-top: 0; }

  /* Lead article */
  .article-lead {
    padding: 20px 0 24px;
    border-bottom: 3px double var(--ink);
    margin-bottom: 20px;
  }
  .article-lead h2 {
    font: 900 clamp(28px, 5vw, 46px)/1.08 var(--serif);
    color: var(--ink); margin-bottom: 12px; letter-spacing: -0.5px;
    text-align: center; max-width: 85%; margin-left: auto; margin-right: auto;
  }
  .article-lead .source {
    text-align: center;
    font: 400 10px/1 var(--mono); letter-spacing: 2px; text-transform: uppercase;
    color: var(--faded); margin-bottom: 14px;
  }
  .article-lead .source a { color: var(--faded); text-decoration: none; }
  .article-lead .source a:hover { color: var(--ink); }
  .article-lead .lead-body {
    columns: 2; column-gap: var(--col-gap); column-rule: var(--rule-width) solid var(--rule);
    font: 400 16px/1.7 var(--body); color: #222;
  }
  .article-lead .lead-body p { margin-bottom: 0; }
  .article-lead .lead-body p::first-letter {
    float: left; font: 900 3.2em/0.8 var(--serif); color: var(--red);
    padding: 4px 8px 0 0;
  }
  .article-lead .read-original { display: block; text-align: center; margin-top: 14px; }
  @media (max-width: 600px) { .article-lead .lead-body { columns: 1; } .article-lead h2 { max-width: 100%; } }

  /* Column grid for remaining articles */
  .columns {
    display: grid;
    grid-template-columns: 1fr var(--rule-width) 1fr;
    gap: 0 var(--col-gap);
    margin-bottom: 20px;
  }
  .columns .col-rule {
    background: var(--rule); width: var(--rule-width);
    justify-self: center;
  }
  .col { display: flex; flex-direction: column; gap: 0; }

  @media (max-width: 600px) {
    .columns { grid-template-columns: 1fr; gap: 0; }
    .columns .col-rule { display: none; }
  }

  /* Individual column articles */
  .article-col {
    padding: 16px 0;
    border-bottom: 1px solid var(--light);
  }
  .article-col:last-child { border-bottom: none; }
  .article-col h3 {
    font: 700 clamp(16px, 2.5vw, 21px)/1.2 var(--serif);
    color: var(--ink); margin-bottom: 6px;
  }
  .article-col .source {
    font: 400 9px/1 var(--mono); letter-spacing: 2px; text-transform: uppercase;
    color: var(--faded); margin-bottom: 8px;
  }
  .article-col .source a { color: var(--faded); text-decoration: none; }
  .article-col .source a:hover { color: var(--ink); }
  .article-col p {
    font: 400 14px/1.6 var(--body); color: #333;
  }

  /* Bottom stories row (3-col if enough articles) */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr var(--rule-width) 1fr var(--rule-width) 1fr;
    gap: 0 var(--col-gap);
    padding-top: 16px;
    border-top: 2px solid var(--ink);
    margin-top: 4px;
  }
  .bottom-row .col-rule { background: var(--rule); width: var(--rule-width); justify-self: center; }
  .bottom-row .article-brief h4 {
    font: 700 clamp(14px, 2vw, 17px)/1.25 var(--serif);
    color: var(--ink); margin-bottom: 4px;
  }
  .bottom-row .article-brief .source {
    font: 400 9px/1 var(--mono); letter-spacing: 2px; text-transform: uppercase;
    color: var(--faded); margin-bottom: 6px;
  }
  .bottom-row .article-brief .source a { color: var(--faded); text-decoration: none; }
  .bottom-row .article-brief .source a:hover { color: var(--ink); }
  .bottom-row .article-brief p {
    font: 400 13px/1.55 var(--body); color: #444;
  }
  @media (max-width: 700px) {
    .bottom-row { grid-template-columns: 1fr; gap: 16px 0; }
    .bottom-row .col-rule { display: none; }
    .bottom-row .article-brief { padding-bottom: 16px; border-bottom: 1px solid var(--light); }
  }

  /* Shared article bits */
  .read-original {
    display: inline-block; margin-top: 8px;
    font: 400 11px/1 var(--mono); color: var(--faded);
    text-decoration: none; letter-spacing: 0.5px; transition: color 0.15s;
  }
  .read-original:hover { color: var(--red); }

  .sub { background: linear-gradient(180deg, transparent 72%, var(--highlight) 72%, var(--highlight) 95%, transparent 95%); font-style: italic; font-weight: 600; }

  /* ── Empty / Error ── */
  .empty { text-align: center; padding: 60px 24px; color: var(--faded); }
  .empty .icon { font-size: 48px; margin-bottom: 16px; }
  .empty p { font: 400 14px/1.6 var(--mono); max-width: 440px; margin: 0 auto; }
  .empty .hint { font-size: 11px; color: #bbb; }
  .error { text-align: center; padding: 24px; color: var(--red); font: 400 13px/1.4 var(--mono); margin-bottom: 16px; }

  /* ── Footer ── */
  .footer {
    margin-top: 32px; padding-top: 16px; border-top: 3px double var(--ink);
    text-align: center; font: 400 10px/1.4 var(--mono); color: var(--faded); letter-spacing: 1px;
  }

  /* ── Subs page ── */
  .subs-page { max-width: 700px; margin: 28px auto 0; }
  .subs-page h2 { font: 700 28px/1.2 var(--serif); margin-bottom: 8px; }
  .subs-page > p { font: 400 15px/1.6 var(--body); color: #555; margin-bottom: 24px; }
  .subs-add { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .subs-add input {
    flex: 1 1 180px; padding: 10px 14px; border: 1.5px solid var(--light); background: #fff;
    font: 400 13px/1 var(--mono); outline: none; transition: border-color 0.15s;
  }
  .subs-add input:focus { border-color: var(--ink); }
  .subs-add .arrow { display: flex; align-items: center; font-size: 20px; color: var(--faded); }
  .subs-list { display: grid; gap: 1px; max-height: 500px; overflow-y: auto; }
  .subs-row {
    display: flex; align-items: center; gap: 8px; padding: 7px 12px;
    font: 400 12px/1.4 var(--mono);
  }
  .subs-row:nth-child(even) { background: rgba(0,0,0,0.025); }
  .subs-row .from { flex: 1; color: var(--red); text-decoration: line-through; }
  .subs-row .to { flex: 1; color: #060; font-weight: 600; font-style: italic; }
  .subs-row .arrow { color: var(--faded); }
  .subs-row .remove {
    background: none; border: none; color: var(--light); cursor: pointer;
    font-size: 18px; padding: 0 4px; line-height: 1; transition: color 0.15s;
  }
  .subs-row .remove:hover { color: var(--red); }

  /* ── About ── */
  .about { max-width: 600px; margin: 28px auto 0; }
  .about h2 { font: 700 28px/1.2 var(--serif); margin-bottom: 16px; }
  .about p { font: 400 15px/1.75 var(--body); color: #333; margin-bottom: 16px; }
  .about .colophon { color: var(--faded); font: 400 13px/1.6 var(--mono); margin-top: 32px; }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .article-lead, .article-col, .article-brief { animation: fadeIn 0.3s ease both; }
  .article-col:nth-child(2) { animation-delay: 0.05s; }
  .article-col:nth-child(3) { animation-delay: 0.1s; }
  .article-brief:nth-child(1) { animation-delay: 0.15s; }
  .article-brief:nth-child(3) { animation-delay: 0.2s; }
  .article-brief:nth-child(5) { animation-delay: 0.25s; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script src="substitutions.js"></script>
<script>
// ============================================================
// CONFIG — Change this to your Cloudflare Worker URL
// ============================================================
const WORKER_URL = 'https://api.thesubstandard.uk';

// Fallback: free public CORS proxy for testing before worker is set up
// Set to '' to disable fallback
const FALLBACK_PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';

// ============================================================
// FEEDS
// ============================================================
const FEEDS = {
  uk: {
    label: 'UK', emoji: '\u{1F1EC}\u{1F1E7}',
    sources: [
      { url: 'https://feeds.bbci.co.uk/news/uk/rss.xml', name: 'BBC News' },
      { url: 'https://feeds.bbci.co.uk/news/uk/politics/rss.xml', name: 'BBC Politics' },
      { url: 'https://feeds.bbci.co.uk/news/england/rss.xml', name: 'BBC England' },
      { url: 'https://www.theguardian.com/uk-news/rss', name: 'The Guardian' },
      { url: 'https://www.theguardian.com/politics/rss', name: 'Guardian Politics' },
      { url: 'https://feeds.skynews.com/feeds/rss/uk.xml', name: 'Sky News' },
    ]
  },
  world: {
    label: 'World', emoji: '\u{1F30D}',
    sources: [
      { url: 'https://feeds.bbci.co.uk/news/world/rss.xml', name: 'BBC World' },
      { url: 'https://feeds.bbci.co.uk/news/world/europe/rss.xml', name: 'BBC Europe' },
      { url: 'https://feeds.bbci.co.uk/news/world/us_and_canada/rss.xml', name: 'BBC Americas' },
      { url: 'https://feeds.bbci.co.uk/news/world/middle_east/rss.xml', name: 'BBC Middle East' },
      { url: 'https://www.theguardian.com/world/rss', name: 'The Guardian' },
    ]
  },
  tech: {
    label: 'Tech', emoji: '\u{1F4BB}',
    sources: [
      { url: 'https://feeds.bbci.co.uk/news/technology/rss.xml', name: 'BBC Technology' },
      { url: 'https://feeds.arstechnica.com/arstechnica/index', name: 'Ars Technica' },
      { url: 'https://www.theguardian.com/technology/rss', name: 'Guardian Tech' },
      { url: 'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml', name: 'BBC Science' },
    ]
  },
  sport: {
    label: 'Sport', emoji: '\u{26BD}',
    sources: [
      { url: 'https://feeds.bbci.co.uk/sport/rss.xml', name: 'BBC Sport' },
      { url: 'https://feeds.bbci.co.uk/sport/football/rss.xml', name: 'BBC Football' },
      { url: 'https://feeds.bbci.co.uk/sport/cricket/rss.xml', name: 'BBC Cricket' },
      { url: 'https://www.theguardian.com/sport/rss', name: 'Guardian Sport' },
    ]
  },
};

// ============================================================
// SUBSTITUTION ENGINE
// ============================================================
const A_EXCEPTIONS = ["unicorn","uniform","union","unique","unit","united","universal","university","usage","use","used","useful","user","usual","usually","utility","utopia","one","once","european"];
const AN_EXCEPTIONS = ["hour","hours","hourly","honest","honor","honour","heir","heiress","herb","homage","fbi","mba","mri","html","http","sql","nhs","mp","mps","sdd","lcd","led","mpeg"];

function needsAn(word) {
  const l = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!l) return false;
  if (AN_EXCEPTIONS.some(e => l === e || l.startsWith(e))) return true;
  if (A_EXCEPTIONS.some(e => l === e || l.startsWith(e))) return false;
  return /^[aeiou]/i.test(l);
}

function matchCase(original, replacement) {
  if (!original || !replacement) return replacement;
  if (original === original.toUpperCase() && /[a-zA-Z]/.test(original)) return replacement.toUpperCase();
  if (original[0] === original[0].toUpperCase() && original[0] !== original[0].toLowerCase()) {
    return replacement.charAt(0).toUpperCase() + replacement.slice(1);
  }
  return replacement.toLowerCase();
}

function fixArticles(text) {
  return text.replace(/\b(a|an)\s+(\u27E6SUB:(.*?)\u27E7)/gi, (_, article, subMarker, subWord) => {
    const firstWord = subWord.split(/\s+/)[0];
    const wantsAn = needsAn(firstWord);
    const isCap = article[0] === article[0].toUpperCase() && article[0] !== article[0].toLowerCase();
    let na = wantsAn ? 'an' : 'a';
    if (isCap) na = na.charAt(0).toUpperCase() + na.slice(1);
    if (na.toLowerCase() !== article.toLowerCase()) return `\u27E6SUB:${na}\u27E7 ${subMarker}`;
    return `${na} ${subMarker}`;
  });
}

function applySubstitutions(text, subs) {
  if (!text) return '';
  let result = text;
  const sorted = [...subs].sort((a, b) => b[0].length - a[0].length);
  for (const [from, to] of sorted) {
    const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`\\b${escaped}\\b`, 'gi');
    const tmp = result; result = ''; let last = 0, m;
    while ((m = regex.exec(tmp)) !== null) {
      result += tmp.slice(last, m.index);
      result += `\u27E6SUB:${matchCase(m[0], to)}\u27E7`;
      last = m.index + m[0].length;
    }
    result += tmp.slice(last);
  }
  return fixArticles(result);
}

function renderMangled(text) {
  if (!text) return '';
  return text.replace(/\u27E6SUB:(.*?)\u27E7/g, '<span class="sub">$1</span>');
}

// ============================================================
// NEWS FETCHING
// ============================================================
async function fetchFeedViaWorker(feedUrl, sourceName) {
  const url = `${WORKER_URL}?feed=${encodeURIComponent(feedUrl)}&source=${encodeURIComponent(sourceName)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Worker returned ${resp.status}`);
  return await resp.json();
}

async function fetchFeedViaRss2Json(feedUrl, sourceName) {
  const url = `${FALLBACK_PROXY}${encodeURIComponent(feedUrl)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Proxy returned ${resp.status}`);
  const data = await resp.json();
  if (data.status !== 'ok' || !data.items) throw new Error('Bad proxy response');
  return data.items.map(item => {
    // rss2json sometimes has content vs description - pick the longer one
    const desc = (item.description || '').replace(/<[^>]+>/g, '').trim();
    const content = (item.content || '').replace(/<[^>]+>/g, '').trim();
    let summary = content.length > desc.length ? content : desc;
    if (summary.length > 500) {
      const t = summary.slice(0, 500);
      const ls = t.lastIndexOf('. ');
      summary = ls > 200 ? t.slice(0, ls + 1) : t + '...';
    }
    return {
      headline: item.title || '',
      summary: summary,
      link: item.link || '',
      source: sourceName,
      pubDate: item.pubDate || '',
    };
  });
}

async function fetchFeed(feedUrl, sourceName) {
  // Try worker first, fall back to rss2json
  try {
    return await fetchFeedViaWorker(feedUrl, sourceName);
  } catch (e) {
    console.warn(`Worker failed for ${sourceName}, trying fallback:`, e.message);
    if (FALLBACK_PROXY) {
      return await fetchFeedViaRss2Json(feedUrl, sourceName);
    }
    throw e;
  }
}

async function fetchAllForFeed(feedKey) {
  const feed = FEEDS[feedKey];
  const promises = feed.sources.map(s => fetchFeed(s.url, s.name).catch(() => []));
  const results = await Promise.all(promises);
  const all = results.flat();
  // Deduplicate by headline similarity
  const seen = new Set();
  return all.filter(a => {
    const key = a.headline.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 50);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 30);
}

// ============================================================
// APP STATE
// ============================================================
const state = {
  tab: 'frontpage', // frontpage | subs | about
  feed: 'uk',
  subs: DEFAULT_SUBS.map(([f, t]) => ({ from: f, to: t })),
  articlesByFeed: {},
  loading: false,
  error: null,
  showOriginal: false,
};

// ============================================================
// RENDERING
// ============================================================
const $ = (sel) => document.querySelector(sel);
const app = () => $('#app');

function render() {
  const articles = state.articlesByFeed[state.feed] || [];
  const hasFetched = articles.length > 0;
  const feedInfo = FEEDS[state.feed];
  const subsArr = state.subs.map(s => [s.from, s.to]);

  let html = '';

  // Masthead
  const today = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  html += `
    <div class="masthead">
      <div class="masthead-tagline">All the news that's fit to mangle</div>
      <h1>The Substandard</h1>
      <div class="masthead-meta">
        <span>${today}</span>
        <span>Est. 2026</span>
        <span>Free &mdash; obviously</span>
      </div>
    </div>`;

  // Main nav
  const tabs = [['frontpage', 'Front Page'], ['subs', 'Substitutions'], ['about', 'About']];
  html += '<nav class="main-nav">';
  for (const [key, label] of tabs) {
    html += `<button data-tab="${key}" class="${state.tab === key ? 'active' : ''}">${label}</button>`;
  }
  html += '</nav>';

  // Feed sub-nav
  if (state.tab === 'frontpage') {
    html += '<div class="feed-nav">';
    for (const [key, feed] of Object.entries(FEEDS)) {
      const isActive = state.feed === key;
      const cached = (state.articlesByFeed[key] || []).length > 0;
      html += `<button data-feed="${key}" class="${isActive ? 'active' : ''}">${feed.label}${cached && !isActive ? '<span class="dot"></span>' : ''}</button>`;
    }
    html += '</div>';

    // Controls - only show when we have articles
    if (hasFetched || state.loading) {
      html += '<div class="controls">';
      if (hasFetched) {
        html += `<button class="btn btn-primary" id="fetch-btn" ${state.loading ? 'disabled' : ''}>
          ${state.loading ? 'Refreshing...' : 'Refresh'}
        </button>`;
        html += `<button class="btn btn-toggle ${state.showOriginal ? 'on' : ''}" id="toggle-btn">
          ${state.showOriginal ? 'Showing originals' : 'Show originals'}
        </button>`;
      }
      html += '</div>';
    }

    if (state.error) {
      html += `<div class="error">${state.error}</div>`;
    }

    if (!hasFetched && state.loading) {
      html += `<div class="empty">
        <p>Fetching <strong>${feedInfo.label}</strong> news...</p>
      </div>`;
    }

    if (hasFetched) {
      html += '<div class="articles">';

      // Section header
      html += `<div class="section-header">${feedInfo.label} Edition</div>`;

      // Helpers
      const srcLine = (a) => a.link
        ? `<a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.source)}</a>`
        : esc(a.source);
      const readLink = (a) => a.link
        ? `<a href="${esc(a.link)}" target="_blank" rel="noopener" class="read-original">\u2192 Read original</a>`
        : '';

      // ── Lead article (index 0) ──
      const lead = articles[0];
      if (lead) {
        const leadH = applySubstitutions(lead.headline, subsArr);
        const leadS = applySubstitutions(lead.summary, subsArr);
        html += `<div class="article-lead">
          <h2>${state.showOriginal ? esc(lead.headline) : renderMangled(leadH)}</h2>
          <div class="source">${srcLine(lead)}</div>
          <div class="lead-body">
            <p>${state.showOriginal ? esc(lead.summary) : renderMangled(leadS)}</p>
          </div>
          ${readLink(lead)}
        </div>`;
      }

      // ── Top columns (articles 1-6) ──
      const topArticles = articles.slice(1, 7);
      if (topArticles.length > 0) {
        const leftCol = topArticles.filter((_, i) => i % 2 === 0);
        const rightCol = topArticles.filter((_, i) => i % 2 === 1);
        const renderColArticle = (a) => {
          const mH = applySubstitutions(a.headline, subsArr);
          const mS = applySubstitutions(a.summary, subsArr);
          return `<div class="article-col">
            <h3>${state.showOriginal ? esc(a.headline) : renderMangled(mH)}</h3>
            <div class="source">${srcLine(a)}</div>
            <p>${state.showOriginal ? esc(a.summary) : renderMangled(mS)}</p>
            ${readLink(a)}
          </div>`;
        };
        html += '<div class="columns">';
        html += `<div class="col">${leftCol.map(renderColArticle).join('')}</div>`;
        html += '<div class="col-rule"></div>';
        html += `<div class="col">${rightCol.map(renderColArticle).join('')}</div>`;
        html += '</div>';
      }

      // ── Mid briefs 3-col (articles 7-12) ──
      const midBriefs = articles.slice(7, 13);
      if (midBriefs.length > 0) {
        html += '<div class="bottom-row">';
        midBriefs.slice(0, 3).forEach((a, i) => {
          if (i > 0) html += '<div class="col-rule"></div>';
          const bH = applySubstitutions(a.headline, subsArr);
          const bS = applySubstitutions(a.summary, subsArr);
          html += `<div class="article-brief">
            <h4>${state.showOriginal ? esc(a.headline) : renderMangled(bH)}</h4>
            <div class="source">${srcLine(a)}</div>
            <p>${state.showOriginal ? esc(a.summary) : renderMangled(bS)}</p>
            ${readLink(a)}
          </div>`;
        });
        for (let i = Math.min(midBriefs.length, 3); i < 3; i++) {
          html += '<div class="col-rule"></div><div class="article-brief"></div>';
        }
        html += '</div>';

        // Second row of 3
        if (midBriefs.length > 3) {
          html += '<div class="bottom-row" style="border-top:1px solid var(--light);margin-top:16px;padding-top:16px">';
          midBriefs.slice(3, 6).forEach((a, i) => {
            if (i > 0) html += '<div class="col-rule"></div>';
            const bH = applySubstitutions(a.headline, subsArr);
            const bS = applySubstitutions(a.summary, subsArr);
            html += `<div class="article-brief">
              <h4>${state.showOriginal ? esc(a.headline) : renderMangled(bH)}</h4>
              <div class="source">${srcLine(a)}</div>
              <p>${state.showOriginal ? esc(a.summary) : renderMangled(bS)}</p>
              ${readLink(a)}
            </div>`;
          });
          for (let i = midBriefs.slice(3).length; i < 3; i++) {
            html += '<div class="col-rule"></div><div class="article-brief"></div>';
          }
          html += '</div>';
        }
      }

      // ── Lower columns (articles 13-20) ──
      const lowerArticles = articles.slice(13, 21);
      if (lowerArticles.length > 0) {
        html += `<div class="section-header">More Stories</div>`;
        const leftCol = lowerArticles.filter((_, i) => i % 2 === 0);
        const rightCol = lowerArticles.filter((_, i) => i % 2 === 1);
        const renderColArticle = (a) => {
          const mH = applySubstitutions(a.headline, subsArr);
          const mS = applySubstitutions(a.summary, subsArr);
          return `<div class="article-col">
            <h3>${state.showOriginal ? esc(a.headline) : renderMangled(mH)}</h3>
            <div class="source">${srcLine(a)}</div>
            <p>${state.showOriginal ? esc(a.summary) : renderMangled(mS)}</p>
            ${readLink(a)}
          </div>`;
        };
        html += '<div class="columns">';
        html += `<div class="col">${leftCol.map(renderColArticle).join('')}</div>`;
        html += '<div class="col-rule"></div>';
        html += `<div class="col">${rightCol.map(renderColArticle).join('')}</div>`;
        html += '</div>';
      }

      // ── Bottom briefs (articles 21+) ──
      const extraArticles = articles.slice(21);
      if (extraArticles.length > 0) {
        html += `<div class="section-header">In Brief</div>`;
        // Render in rows of 3
        for (let row = 0; row < extraArticles.length; row += 3) {
          const chunk = extraArticles.slice(row, row + 3);
          html += `<div class="bottom-row"${row > 0 ? ' style="border-top:1px solid var(--light);margin-top:16px;padding-top:16px"' : ''}>`;
          chunk.forEach((a, i) => {
            if (i > 0) html += '<div class="col-rule"></div>';
            const bH = applySubstitutions(a.headline, subsArr);
            const bS = applySubstitutions(a.summary, subsArr);
            html += `<div class="article-brief">
              <h4>${state.showOriginal ? esc(a.headline) : renderMangled(bH)}</h4>
              <div class="source">${srcLine(a)}</div>
              <p>${state.showOriginal ? esc(a.summary) : renderMangled(bS)}</p>
              ${readLink(a)}
            </div>`;
          });
          for (let i = chunk.length; i < 3; i++) {
            html += '<div class="col-rule"></div><div class="article-brief"></div>';
          }
          html += '</div>';
        }
      }

      html += '</div>'; // .articles

      html += `<div class="footer">
        ${feedInfo.label} edition \u00B7 ${articles.length} stories \u00B7 ${state.subs.length} rules active \u00B7 Mangled words are <span class="sub">highlighted</span> \u00B7 <a href="https://xkcd.com/1288/" target="_blank" rel="noopener" style="color:inherit">Inspired by XKCD</a>
      </div>`;
    }
  }

  // Substitutions page
  if (state.tab === 'subs') {
    html += `<div class="subs-page" style="margin-top:28px">
      <h2>Substitution Rules</h2>
      <p>Word swaps applied to every article. Add your own, remove the duds. Changes apply immediately across all feeds.</p>
      <div class="subs-add">
        <input id="sub-from" placeholder="Original word..." />
        <span class="arrow">\u2192</span>
        <input id="sub-to" placeholder="Replacement..." />
        <button class="btn btn-primary" id="add-sub-btn">+ Add</button>
      </div>
      <div class="subs-list">`;
    state.subs.forEach((s, i) => {
      html += `<div class="subs-row">
        <span class="from">${esc(s.from)}</span>
        <span class="arrow">\u2192</span>
        <span class="to">${esc(s.to)}</span>
        <button class="remove" data-idx="${i}">\u00D7</button>
      </div>`;
    });
    html += '</div></div>';
  }

  // About page
  if (state.tab === 'about') {
    html += `<div class="about" style="margin-top:28px">
      <h2>What is this?</h2>
      <p><strong>The Substandard</strong> takes real news headlines and summaries, then applies a set of word substitutions to make them considerably more entertaining and considerably less informative.</p>
      <p>Inspired by <strong>XKCD #1288</strong> ("Substitutions"), which suggested that replacing words like "senator" with "elf-lord" and "car" with "cat" makes the news genuinely more fun to read.</p>
      <p>Substituted words are <span class="sub">highlighted like this</span> so you can tell what's been mangled. Toggle the "Show Original" button to see the unmangled version.</p>
      <p>Choose your news desk \u2014 UK, World, Tech, or Sport \u2014 and the mangler will fetch relevant headlines for that beat. Each feed is cached independently, so you can bounce between them. Customise the substitution rules on the Substitutions tab.</p>
      <p class="colophon">No journalists were harmed in the making of this website.<br>Their words, however, were absolutely brutalised.</p>
    </div>`;
  }

  app().innerHTML = html;
  bindEvents();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function bindEvents() {
  // Tab nav
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); });
  });

  // Feed nav - auto-fetch if not cached
  document.querySelectorAll('[data-feed]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.feed = btn.dataset.feed;
      render();
      if (!(state.articlesByFeed[state.feed] || []).length && !state.loading) {
        doFetch();
      }
    });
  });

  // Fetch button
  const fetchBtn = $('#fetch-btn');
  if (fetchBtn) fetchBtn.addEventListener('click', doFetch);

  // Toggle originals
  const toggleBtn = $('#toggle-btn');
  if (toggleBtn) toggleBtn.addEventListener('click', () => { state.showOriginal = !state.showOriginal; render(); });

  // Add substitution
  const addBtn = $('#add-sub-btn');
  if (addBtn) {
    addBtn.addEventListener('click', addSub);
    const toInput = $('#sub-to');
    if (toInput) toInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSub(); });
  }

  // Remove substitution
  document.querySelectorAll('.subs-row .remove').forEach(btn => {
    btn.addEventListener('click', () => {
      state.subs.splice(parseInt(btn.dataset.idx), 1);
      render();
    });
  });
}

function addSub() {
  const fromEl = $('#sub-from'), toEl = $('#sub-to');
  if (fromEl.value.trim() && toEl.value.trim()) {
    state.subs.push({ from: fromEl.value.trim().toLowerCase(), to: toEl.value.trim() });
    fromEl.value = ''; toEl.value = '';
    render();
  }
}

async function doFetch() {
  state.loading = true;
  state.error = null;
  render();

  try {
    const articles = await fetchAllForFeed(state.feed);
    if (articles.length === 0) throw new Error('No articles returned');
    state.articlesByFeed[state.feed] = articles;
  } catch (e) {
    console.error(e);
    state.error = 'The designated fibber is guilty and everyone knows it. Check the console for details.';
  } finally {
    state.loading = false;
    render();
  }
}

// Initial render and auto-fetch UK news
render();
doFetch();
</script>
</body>
</html>
